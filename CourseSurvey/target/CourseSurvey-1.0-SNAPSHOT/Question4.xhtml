<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
   
    <h:head>
        <title>Course Survey</title>
        <link href="style.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body>
        
    <h:form>
        <h1>Resources and Administration</h1>
        
        <h3>Question 14</h3>
        <p>14. The course was supported by adequate library resources.</p>
        <h:selectOneRadio value="#{userData.answers[14]}">
        <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
      
        <h3>Question 15</h3>
        <p>15. Blackboard resources for the course were useful.</p>
            <h:selectOneRadio value="#{userData.answers[15]}">
           <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
        
        <h3>Question 16</h3>
        <p>16. Instructor gave guidance on where to find resources.</p>
        <h:selectOneRadio value="#{userData.answers[16]}">
        <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
        
        <h:outputLabel value = "Comments (Resources and Administration)"/>
        <h:inputText id = "Comments"  required = "true">
            </h:inputText>
          <h:commandButton value = "Save and Continue" action ="#{userData.submit('Question5.xhtml')}" />
</h:form> 
    </h:body>
</html>
