<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    
     <h:head>
        <title>Course Survey</title>
        <link href="style.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body>
        
        <h1>Feedback and Assessment</h1>
        <h:form>
        <h3>Question 11</h3>
        <p>Information about the assessment was communicated clearly</p>
        <h:selectOneRadio value="#{userData.answers[11]}">
        <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
      
        <h3>Question 12</h3>
        <p>12. Feedback was provided within the stated timeframe.</p>
            <h:selectOneRadio value="#{userData.answers[12]}">
            <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
        
        <h3>Question 13</h3>
        <p>13. Feedback showed how to improve my work(e .g. corrections including comments).</p>
        <h:selectOneRadio value="#{userData.answers[13]}">
        <f:selectItem itemValue = "Strongly Agree" itemLabel = "Strongly Agree" />
        <f:selectItem itemValue = "Agree" itemLabel = "Agree" />
        <f:selectItem itemValue = "Neutral" itemLabel = "Neutral" />
        <f:selectItem itemValue = "Disagree" itemLabel = "Disagree" />
        <f:selectItem itemValue = "Strongly Disagree" itemLabel = "Strongly Disagree" />
        </h:selectOneRadio>
        
        <h:outputLabel value = "Comments (Feedback and Assessments)"/>
        <h:inputText id = "Comments"  required = "true">
            </h:inputText>
          <h:commandButton value = "Save and Continue" action ="#{userData.submit('Question4.xhtml')}" />
</h:form> 
        </h:body>
</html>
