<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
    <h:head>
        <title>Login</title>
        <link href="style.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body>
         <h1>UHCL Evaluation Login</h1>
        <h:form>
            <h:outputLabel value = "Enter Username"/>
            <h:inputText id = "username" value ="#{userData.username}" required = "true">
            </h:inputText>
            <br/>
            <h:outputLabel value = "Enter Password" />
            
            <h:inputSecret id = "password" value ="#{userData.password}"  required = "true">
            </h:inputSecret>
            <br/>
            <h:commandButton value = "Login" action = "#{userData.validateAccount}" />
            <h:messages globalOnly="true" />

        </h:form>
        
        
        
        
        
    </h:body>
</html>
